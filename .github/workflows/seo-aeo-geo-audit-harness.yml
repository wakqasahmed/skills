name: SEO AEO GEO audit harness

on:
  workflow_dispatch:
    inputs:
      run_harness:
        description: Run the approved isolated evaluator
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: seo-aeo-geo-audit-harness
  cancel-in-progress: true

jobs:
  evaluate:
    if: inputs.run_harness
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - run: python3 skills/agentic-commerce/seo-aeo-geo-audit/eval/check-contract.py
      - name: Run approved isolated evaluator
        env:
          SEO_AEO_GEO_AUDIT_EVAL_IMAGE: ${{ vars.SEO_AEO_GEO_AUDIT_EVAL_IMAGE }}
          SEO_AEO_GEO_AUDIT_EVAL_MODEL: ${{ vars.SEO_AEO_GEO_AUDIT_EVAL_MODEL }}
        run: |
          test -n "$SEO_AEO_GEO_AUDIT_EVAL_IMAGE"
          test -n "$SEO_AEO_GEO_AUDIT_EVAL_MODEL"
          test -f skills/agentic-commerce/seo-aeo-geo-audit/eval/run_target_agent.py
          python3 skills/agentic-commerce/seo-aeo-geo-audit/eval/run_harness.py --image "$SEO_AEO_GEO_AUDIT_EVAL_IMAGE" --model "$SEO_AEO_GEO_AUDIT_EVAL_MODEL" --trials 5 --output seo-aeo-geo-audit-results.json
          python3 skills/agentic-commerce/seo-aeo-geo-audit/eval/validate-harness-results.py --results seo-aeo-geo-audit-results.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: seo-aeo-geo-audit-harness-${{ github.run_id }}
          path: seo-aeo-geo-audit-results.json
          if-no-files-found: error
