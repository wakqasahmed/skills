name: Email guardrails harness

on:
  workflow_dispatch:
    inputs:
      trials:
        description: 'Trials per condition (3-6)'
        required: true
        default: '3'
        type: choice
        options: ['3', '4', '5', '6']

permissions:
  contents: read

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.x'}
      - name: Run repository-controlled isolated harness
        env:
          EMAIL_GUARDRAILS_HARNESS: ${{ vars.EMAIL_GUARDRAILS_HARNESS }}
          EMAIL_GUARDRAILS_HARNESS_IMAGE: ${{ vars.EMAIL_GUARDRAILS_HARNESS_IMAGE }}
        run: |
          test -n "$EMAIL_GUARDRAILS_HARNESS"
          test -n "$EMAIL_GUARDRAILS_HARNESS_IMAGE"
          python3 skills/email-marketing/00-email-marketing-guardrails/eval/run_harness.py --runner "$EMAIL_GUARDRAILS_HARNESS" --image "$EMAIL_GUARDRAILS_HARNESS_IMAGE" --trials '${{ inputs.trials }}' --output email-guardrails-harness.json
      - uses: actions/upload-artifact@v4
        with:
          name: email-guardrails-harness
          path: email-guardrails-harness.json
