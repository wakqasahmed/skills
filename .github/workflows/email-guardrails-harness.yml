name: Email guardrails harness

on:
  workflow_dispatch:
    inputs:
      runner_command:
        description: 'Agent harness command; must emit JSON records to stdout'
        required: true
        type: string
      trials:
        description: 'Trials per condition (3-6)'
        required: true
        default: '3'
        type: choice
        options: ['3', '4', '5', '6']

permissions:
  contents: read

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.x'}
      - run: python3 skills/email-marketing/00-email-marketing-guardrails/eval/run_harness.py --command '${{ inputs.runner_command }}' --trials '${{ inputs.trials }}' --output email-guardrails-harness.json
      - uses: actions/upload-artifact@v4
        with:
          name: email-guardrails-harness
          path: email-guardrails-harness.json
