name: Validate plugin

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python3 -m unittest tests/test_validate_plugin.py
      - run: python3 scripts/validate-plugin.py
      - run: bash scripts/run-behavior-evals.sh
      - run: python3 -m unittest tests/test_trigger_evals.py
      - run: python3 eval/run-trigger-evals.py --split validation
