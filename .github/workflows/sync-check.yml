name: sync-check

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [source-updated]

permissions:
  contents: write
  pull-requests: write

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone source repos
        run: |
          git clone --depth 1 https://github.com/wakqasahmed/ai-visibility-skills /tmp/ai-visibility-skills
          git clone --depth 1 https://github.com/wakqasahmed/agentic-commerce-skills /tmp/agentic-commerce-skills
          git clone --depth 1 https://github.com/wakqasahmed/ai-engineering-workflow-skills /tmp/ai-engineering-workflow-skills
          git clone --depth 1 https://github.com/wakqasahmed/php-laravel-filament-skills /tmp/php-laravel-filament-skills
          git clone --depth 1 https://github.com/wakqasahmed/email-marketing-skills /tmp/email-marketing-skills

      - name: Sync from source
        run: scripts/sync-from-source.sh /tmp/ai-visibility-skills /tmp/agentic-commerce-skills /tmp/ai-engineering-workflow-skills /tmp/php-laravel-filament-skills /tmp/email-marketing-skills

      - name: Fail on drift
        id: drift
        run: |
          if git diff --quiet; then
            echo "drifted=false" >> "$GITHUB_OUTPUT"
          else
            echo "drifted=true" >> "$GITHUB_OUTPUT"
            git diff --stat
            if [ "${{ github.event_name }}" = "pull_request" ] || [ "${{ github.event_name }}" = "push" ]; then
              echo "Aggregate has drifted from source repos. Run scripts/sync-from-source.sh and commit." >&2
              exit 1
            fi
          fi

      # Scoped auto-merge exception: this repo is a pure aggregate — its `skills/`
      # content is never hand-edited, only ever mechanically copied from source
      # repos that were already reviewed and merged in their own PR flow. The
      # `validate-plugin.py` check inside sync-from-source.sh (run above, in
      # "Sync from source") is the real gate: if it fails, this job fails before
      # ever reaching this step, so nothing unvalidated can auto-merge. This is a
      # deliberate, narrow exception to the "always require human approval before
      # merging to main" policy used elsewhere in this org — approved explicitly
      # for this repo's sync PRs only, not a general precedent.
      - name: Open and auto-merge sync PR on drift
        if: steps.drift.outputs.drifted == 'true' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branch="sync/from-source-$(date +%Y%m%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add -A skills
          git commit -m "chore: re-sync skill packs from source repos"
          git push -u origin "$branch"
          gh pr create --base main --head "$branch" \
            --title "Re-sync skill packs from source repos" \
            --body "Automated sync: source repos changed and the aggregate drifted. Generated by sync-check workflow. Content already validated by scripts/sync-from-source.sh; auto-merges once checks are green (scoped exception, see workflow comment)."
          gh pr merge "$branch" --auto --squash
