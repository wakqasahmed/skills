name: sync-check

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone source repos
        run: |
          git clone --depth 1 https://github.com/wakqasahmed/ai-visibility-skills /tmp/ai-visibility-skills
          git clone --depth 1 https://github.com/wakqasahmed/agentic-commerce-skills /tmp/agentic-commerce-skills
          git clone --depth 1 https://github.com/wakqasahmed/ai-engineering-workflow-skills /tmp/ai-engineering-workflow-skills

      - name: Sync from source
        run: scripts/sync-from-source.sh /tmp/ai-visibility-skills /tmp/agentic-commerce-skills /tmp/ai-engineering-workflow-skills

      - name: Fail on drift
        id: drift
        run: |
          if git diff --quiet; then
            echo "drifted=false" >> "$GITHUB_OUTPUT"
          else
            echo "drifted=true" >> "$GITHUB_OUTPUT"
            git diff --stat
            if [ "${{ github.event_name }}" = "pull_request" ] || [ "${{ github.event_name }}" = "push" ]; then
              echo "Aggregate has drifted from source repos. Run scripts/sync-from-source.sh and commit." >&2
              exit 1
            fi
          fi

      - name: Open sync PR on scheduled drift
        if: steps.drift.outputs.drifted == 'true' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branch="sync/from-source-$(date +%Y%m%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add -A skills
          git commit -m "chore: re-sync skill packs from source repos"
          git push -u origin "$branch"
          gh pr create --base main --head "$branch" \
            --title "Re-sync skill packs from source repos" \
            --body "Automated sync: source repos changed and the aggregate drifted. Generated by sync-check workflow."
